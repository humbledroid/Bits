<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph Traversal — DFS vs BFS Visualized</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --accent: #e94560;
  --accent2: #7c3aed;
  --green: #10b981;
  --yellow: #f59e0b;
  --cyan: #06b6d4;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --code-bg: #0d1117;
  --border: #334155;
  --led-off: #2a2a3e;
  --led-dfs: #e94560;
  --led-bfs: #06b6d4;
  --led-glow-dfs: rgba(233, 69, 96, 0.6);
  --led-glow-bfs: rgba(6, 182, 212, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}

.app {
  max-width: 940px;
  margin: 0 auto;
  padding: 20px;
}

header {
  text-align: center;
  padding: 40px 0 30px;
  border-bottom: 2px solid var(--surface2);
  margin-bottom: 30px;
}

header h1 {
  font-size: 2.4em;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

header p { color: var(--text-dim); font-size: 1.1em; }

/* Navigation */
.nav {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 30px;
  background: var(--surface);
  padding: 8px;
  border-radius: 12px;
}

.nav button {
  flex: 1;
  min-width: 100px;
  padding: 10px 8px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.85em;
  font-weight: 600;
  transition: all 0.2s;
}

.nav button:hover { background: var(--surface2); color: var(--text); }
.nav button.active { background: var(--accent); color: white; }

/* Progress */
.progress-bar {
  height: 4px;
  background: var(--surface);
  border-radius: 2px;
  margin-bottom: 30px;
  overflow: hidden;
}

.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Sections */
.section {
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.section h2 {
  font-size: 1.8em;
  margin-bottom: 6px;
  color: var(--accent);
}

.section h3 {
  font-size: 1.3em;
  margin: 24px 0 10px;
  color: var(--accent2);
}

.section p { margin-bottom: 14px; }

.highlight { color: var(--yellow); font-weight: 600; }
.accent { color: var(--accent); font-weight: 600; }
.cyan { color: var(--cyan); font-weight: 600; }

/* Code blocks */
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  margin: 16px 0;
  overflow-x: auto;
  font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  font-size: 0.9em;
  line-height: 1.6;
  position: relative;
  white-space: pre;
}

.code-block .lang-tag {
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 0.7em;
  color: var(--text-dim);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 4px;
}

.kw { color: #c678dd; }
.fn { color: #61afef; }
.str { color: #98c379; }
.num { color: #d19a66; }
.cm { color: #5c6370; font-style: italic; }
.tp { color: #e5c07b; }

/* ═══════════════════════════════════ */
/* LED Tree Visualization             */
/* ═══════════════════════════════════ */
.viz-panel {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin: 20px 0;
  position: relative;
  overflow: hidden;
}

.viz-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(15, 52, 96, 0.3) 0%, transparent 70%);
  pointer-events: none;
}

.viz-svg-container, .viz-status, .viz-ds {
  /* Prevents layout shift during targeted updates */
}

.tree-svg {
  width: 100%;
  height: 380px;
  display: block;
}

/* LED node styles */
.led-node {
  cursor: default;
  transition: all 0.3s ease;
}

.led-base {
  fill: var(--led-off);
  stroke: #3a3a55;
  stroke-width: 2;
  transition: all 0.4s ease;
}

.led-shine {
  fill: rgba(255,255,255,0.03);
  transition: all 0.4s ease;
}

.led-label {
  fill: var(--text-dim);
  font-family: 'Fira Code', monospace;
  font-size: 14px;
  font-weight: 700;
  text-anchor: middle;
  dominant-baseline: central;
  transition: fill 0.4s ease;
}

.led-order {
  fill: none;
  font-family: 'Segoe UI', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-anchor: middle;
  transition: fill 0.5s ease;
}

.tree-edge {
  stroke: #2a2a45;
  stroke-width: 2.5;
  stroke-linecap: round;
  transition: stroke 0.4s ease;
}

/* LED lit states */
.led-node.lit-dfs .led-base {
  fill: var(--led-dfs);
  stroke: #ff6b81;
  filter: drop-shadow(0 0 12px var(--led-glow-dfs)) drop-shadow(0 0 24px var(--led-glow-dfs));
}

.led-node.lit-dfs .led-shine {
  fill: rgba(255,255,255,0.25);
}

.led-node.lit-dfs .led-label {
  fill: #fff;
}

.led-node.lit-dfs .led-order {
  fill: var(--yellow);
}

.led-node.lit-bfs .led-base {
  fill: var(--led-bfs);
  stroke: #22d3ee;
  filter: drop-shadow(0 0 12px var(--led-glow-bfs)) drop-shadow(0 0 24px var(--led-glow-bfs));
}

.led-node.lit-bfs .led-shine {
  fill: rgba(255,255,255,0.25);
}

.led-node.lit-bfs .led-label {
  fill: #fff;
}

.led-node.lit-bfs .led-order {
  fill: var(--yellow);
}

.led-node.current .led-base {
  stroke-width: 3;
  animation: pulse 0.8s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { filter: drop-shadow(0 0 12px var(--led-glow-dfs)) drop-shadow(0 0 24px var(--led-glow-dfs)); }
  50% { filter: drop-shadow(0 0 20px var(--led-glow-dfs)) drop-shadow(0 0 40px var(--led-glow-dfs)); }
}

.led-node.current.lit-bfs .led-base {
  animation-name: pulse-bfs;
}

@keyframes pulse-bfs {
  0%, 100% { filter: drop-shadow(0 0 12px var(--led-glow-bfs)) drop-shadow(0 0 24px var(--led-glow-bfs)); }
  50% { filter: drop-shadow(0 0 20px var(--led-glow-bfs)) drop-shadow(0 0 40px var(--led-glow-bfs)); }
}

.tree-edge.lit-dfs { stroke: var(--led-dfs); stroke-width: 3; filter: drop-shadow(0 0 6px var(--led-glow-dfs)); }
.tree-edge.lit-bfs { stroke: var(--led-bfs); stroke-width: 3; filter: drop-shadow(0 0 6px var(--led-glow-bfs)); }

/* Controls */
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  margin-top: 16px;
}

.controls button {
  padding: 8px 20px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  font-weight: 600;
  font-size: 0.88em;
  transition: all 0.2s;
}

.controls button:hover:not(:disabled) {
  transform: translateY(-1px);
}

.controls button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.controls button.dfs {
  border-color: var(--accent);
  color: var(--accent);
}
.controls button.dfs:hover:not(:disabled) {
  background: var(--accent);
  color: white;
}

.controls button.bfs {
  border-color: var(--cyan);
  color: var(--cyan);
}
.controls button.bfs:hover:not(:disabled) {
  background: var(--cyan);
  color: white;
}

.controls button.neutral {
  border-color: var(--text-dim);
  color: var(--text-dim);
}
.controls button.neutral:hover:not(:disabled) {
  background: var(--surface2);
  color: var(--text);
}

.speed-control {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  color: var(--text-dim);
  font-size: 0.82em;
}

.speed-control input[type="range"] {
  width: 80px;
  accent-color: var(--accent2);
}

/* Data structure display */
.ds-display {
  margin-top: 14px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Fira Code', monospace;
  font-size: 0.85em;
  min-height: 44px;
  transition: all 0.3s;
}

.ds-label {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  margin-bottom: 4px;
}

.ds-label.dfs-label { color: var(--accent); }
.ds-label.bfs-label { color: var(--cyan); }

.ds-content {
  color: var(--text);
  word-break: break-all;
}

.ds-content .current-item {
  color: var(--yellow);
  font-weight: 700;
}

.ds-content .visited-item {
  color: var(--text-dim);
}

/* Status message */
.status-msg {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.9em;
  line-height: 1.5;
  animation: fadeIn 0.3s ease;
}

.status-msg.dfs-msg {
  background: rgba(233, 69, 96, 0.08);
  border: 1px solid rgba(233, 69, 96, 0.2);
  color: #fca5a5;
}

.status-msg.bfs-msg {
  background: rgba(6, 182, 212, 0.08);
  border: 1px solid rgba(6, 182, 212, 0.2);
  color: #67e8f9;
}

/* Side-by-side mode */
.side-by-side {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 20px 0;
}

.side-by-side .viz-panel {
  margin: 0;
}

@media (max-width: 700px) {
  .side-by-side { grid-template-columns: 1fr; }
}

/* Analogy / mental model boxes */
.analogy {
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(233, 69, 96, 0.1));
  border: 1px solid var(--accent2);
  border-radius: 10px;
  padding: 18px 20px;
  margin: 18px 0;
}

.analogy .title {
  font-weight: 700;
  color: var(--accent2);
  margin-bottom: 6px;
}

.mental-model {
  background: rgba(245, 158, 11, 0.08);
  border: 1px solid rgba(245, 158, 11, 0.3);
  border-radius: 10px;
  padding: 18px 20px;
  margin: 18px 0;
}

.mental-model .title {
  font-weight: 700;
  color: var(--yellow);
  margin-bottom: 6px;
}

/* Quiz */
.quiz-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin: 20px 0;
}

.quiz-card h4 {
  color: var(--yellow);
  margin-bottom: 4px;
  font-size: 0.85em;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.quiz-card .question {
  font-size: 1.05em;
  margin-bottom: 16px;
  line-height: 1.6;
}

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.quiz-option {
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--code-bg);
  color: var(--text);
  cursor: pointer;
  text-align: left;
  font-size: 0.95em;
  transition: all 0.2s;
  font-family: inherit;
}

.quiz-option:hover:not(:disabled) {
  border-color: var(--accent2);
  background: rgba(124, 58, 237, 0.1);
}

.quiz-option.correct {
  border-color: var(--green);
  background: rgba(16, 185, 129, 0.15);
  color: var(--green);
}

.quiz-option.wrong {
  border-color: var(--accent);
  background: rgba(233, 69, 96, 0.15);
  color: var(--accent);
}

.quiz-explanation {
  margin-top: 14px;
  padding: 14px;
  border-radius: 8px;
  font-size: 0.9em;
  line-height: 1.6;
  animation: fadeIn 0.3s ease;
}

.quiz-explanation.correct {
  background: rgba(16, 185, 129, 0.1);
  border: 1px solid rgba(16, 185, 129, 0.3);
  color: var(--green);
}

.quiz-explanation.wrong {
  background: rgba(233, 69, 96, 0.1);
  border: 1px solid rgba(233, 69, 96, 0.3);
  color: #fca5a5;
}

/* Next button */
.next-btn {
  display: block;
  margin: 30px auto 0;
  padding: 12px 32px;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.next-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(233, 69, 96, 0.3);
}

.step-trace {
  font-family: monospace;
  font-size: 0.88em;
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 12px 0;
  line-height: 1.8;
  white-space: pre-wrap;
  overflow-x: auto;
}

/* Comparison table */
.comparison-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 0.9em;
}

.comparison-table th {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 2px solid var(--border);
  color: var(--text-dim);
  font-size: 0.8em;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.comparison-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}

.comparison-table .col-dfs { color: var(--accent); }
.comparison-table .col-bfs { color: var(--cyan); }

@media (max-width: 600px) {
  .app { padding: 12px; }
  header h1 { font-size: 1.6em; }
  .nav button { font-size: 0.75em; padding: 8px 4px; min-width: 60px; }
  .tree-svg { height: 300px; }
}
</style>
</head>
<body>
<div class="app" id="root"></div>

<script>
// ── State ──
let currentSection = 0;
let quizAnswers = {};

const sections = [
  "The Idea",
  "DFS Deep Dive",
  "BFS Deep Dive",
  "Side by Side",
  "Kotlin Code",
  "Quiz",
  "Problems"
];

// ── Binary Tree Definition ──
// A fixed binary tree for all visualizations
//          1
//        /   \
//       2     3
//      / \   / \
//     4   5 6   7
const TREE = {
  nodes: [
    { id: 1, label: '1' },
    { id: 2, label: '2' },
    { id: 3, label: '3' },
    { id: 4, label: '4' },
    { id: 5, label: '5' },
    { id: 6, label: '6' },
    { id: 7, label: '7' },
  ],
  edges: [
    { from: 1, to: 2 },
    { from: 1, to: 3 },
    { from: 2, to: 4 },
    { from: 2, to: 5 },
    { from: 3, to: 6 },
    { from: 3, to: 7 },
  ]
};

// Node positions for layout (x, y as percentages)
function getNodePositions(w, h) {
  const cx = w / 2;
  const yGap = h / 4.2;
  const topY = 50;
  return {
    1: { x: cx, y: topY },
    2: { x: cx - w * 0.22, y: topY + yGap },
    3: { x: cx + w * 0.22, y: topY + yGap },
    4: { x: cx - w * 0.35, y: topY + yGap * 2 },
    5: { x: cx - w * 0.09, y: topY + yGap * 2 },
    6: { x: cx + w * 0.09, y: topY + yGap * 2 },
    7: { x: cx + w * 0.35, y: topY + yGap * 2 },
  };
}

// DFS order (pre-order: root, left, right)
const DFS_ORDER = [1, 2, 4, 5, 3, 6, 7];
// BFS order (level order)
const BFS_ORDER = [1, 2, 3, 4, 5, 6, 7];

// DFS step descriptions
const DFS_STEPS = [
  "Visit <b>node 1</b> (root). Push right child 3, then left child 2 onto the stack.",
  "Pop <b>node 2</b>. Push its right child 5, then left child 4.",
  "Pop <b>node 4</b>. It's a leaf — no children to push.",
  "Pop <b>node 5</b>. It's a leaf — no children to push.",
  "Pop <b>node 3</b>. Push right child 7, then left child 6.",
  "Pop <b>node 6</b>. It's a leaf — no children to push.",
  "Pop <b>node 7</b>. It's a leaf. Stack is empty — DFS complete!",
];

// BFS step descriptions
const BFS_STEPS = [
  "Visit <b>node 1</b> (root). Enqueue children: 2 and 3.",
  "Dequeue <b>node 2</b>. Enqueue its children: 4 and 5.",
  "Dequeue <b>node 3</b>. Enqueue its children: 6 and 7.",
  "Dequeue <b>node 4</b>. Leaf — nothing to enqueue.",
  "Dequeue <b>node 5</b>. Leaf — nothing to enqueue.",
  "Dequeue <b>node 6</b>. Leaf — nothing to enqueue.",
  "Dequeue <b>node 7</b>. Leaf. Queue is empty — BFS complete!",
];

// DFS stack snapshots (after each visit)
const DFS_STACKS = [
  [3, 2],     // after visiting 1
  [3, 5, 4],  // after visiting 2
  [3, 5],     // after visiting 4
  [3],        // after visiting 5
  [7, 6],     // after visiting 3
  [7],        // after visiting 6
  [],         // after visiting 7
];

// BFS queue snapshots (after each visit)
const BFS_QUEUES = [
  [2, 3],        // after visiting 1
  [3, 4, 5],     // after visiting 2
  [4, 5, 6, 7],  // after visiting 3
  [5, 6, 7],     // after visiting 4
  [6, 7],        // after visiting 5
  [7],           // after visiting 6
  [],            // after visiting 7
];

// ── Animation State ──
let animState = {
  dfs: { step: -1, playing: false, timer: null },
  bfs: { step: -1, playing: false, timer: null },
  sideDfs: { step: -1, playing: false, timer: null },
  sideBfs: { step: -1, playing: false, timer: null },
};
let animSpeed = 800;

// ── Edge map for lighting ──
function getEdgesForNode(nodeId) {
  return TREE.edges.filter(e => e.to === nodeId);
}

// ── Render ──
function render() {
  const app = document.getElementById('root');
  app.innerHTML = `
    <header>
      <h1>DFS vs BFS</h1>
      <p>Watch binary tree traversal as LED bulbs lighting up</p>
    </header>
    <div class="progress-bar"><div class="fill" style="width: ${((currentSection + 1) / sections.length) * 100}%"></div></div>
    <nav class="nav">
      ${sections.map((s, i) => `
        <button class="${i === currentSection ? 'active' : ''}" onclick="goTo(${i})">${s}</button>
      `).join('')}
    </nav>
    <div class="section">
      ${renderSection(currentSection)}
    </div>
  `;
  fixCodeBlocks();
}

function goTo(i) {
  stopAll();
  currentSection = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextSection() {
  if (currentSection < sections.length - 1) {
    stopAll();
    currentSection++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function renderSection(i) {
  switch (i) {
    case 0: return renderIdea();
    case 1: return renderDFS();
    case 2: return renderBFS();
    case 3: return renderSideBySide();
    case 4: return renderCode();
    case 5: return renderQuizSection();
    case 6: return renderProblems();
  }
}

// ═══════════════════════════
// SVG Tree Builder
// ═══════════════════════════
function buildTreeSVG(id, mode, stateKey, w = 460, h = 340) {
  const pos = getNodePositions(w, h);
  const state = animState[stateKey] || { step: -1 };
  const order = mode === 'dfs' ? DFS_ORDER : BFS_ORDER;
  const litSet = new Set();
  let currentNode = null;

  if (state.step >= 0) {
    for (let i = 0; i <= Math.min(state.step, order.length - 1); i++) {
      litSet.add(order[i]);
    }
    currentNode = order[Math.min(state.step, order.length - 1)];
  }

  // Build lit edges
  const litEdges = new Set();
  litSet.forEach(nid => {
    getEdgesForNode(nid).forEach(e => {
      if (litSet.has(e.from)) {
        litEdges.add(e.from + '-' + e.to);
      }
    });
  });

  let svg = `<svg class="tree-svg" viewBox="0 0 ${w} ${h}" id="${id}">`;
  // Edges
  TREE.edges.forEach(e => {
    const p1 = pos[e.from];
    const p2 = pos[e.to];
    const key = e.from + '-' + e.to;
    const litClass = litEdges.has(key) ? ` lit-${mode}` : '';
    svg += `<line class="tree-edge${litClass}" x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}"/>`;
  });

  // Nodes
  TREE.nodes.forEach(n => {
    const p = pos[n.id];
    const isLit = litSet.has(n.id);
    const isCurrent = n.id === currentNode;
    let cls = 'led-node';
    if (isLit) cls += ` lit-${mode}`;
    if (isCurrent) cls += ' current';

    // Traversal order number
    let orderNum = '';
    if (isLit) {
      const idx = order.indexOf(n.id);
      orderNum = idx + 1;
    }

    svg += `<g class="${cls}" transform="translate(${p.x},${p.y})">`;
    svg += `<circle class="led-base" r="24"/>`;
    svg += `<circle class="led-shine" r="18" cy="-4"/>`;
    svg += `<text class="led-label" dy="1">${n.label}</text>`;
    svg += `<text class="led-order" dy="38">${orderNum || ''}</text>`;
    svg += `</g>`;
  });

  svg += `</svg>`;
  return svg;
}

// ═══════════════════════════
// Targeted viz-only DOM update (no full re-render)
// ═══════════════════════════
function updateVizOnly(stateKey, mode) {
  // Find all viz-panels matching this stateKey
  const panels = document.querySelectorAll(`.viz-panel[data-viz="${stateKey}"]`);
  if (panels.length === 0) {
    // Fallback: if panels not found (e.g. section changed), do full render
    render();
    return;
  }
  panels.forEach(panel => {
    const w = stateKey.startsWith('side') ? 400 : 460;
    const h = stateKey.startsWith('side') ? 300 : 340;
    const svgId = panel.querySelector('.tree-svg')?.id || (stateKey + '-tree');

    // Update SVG
    const svgContainer = panel.querySelector('.viz-svg-container');
    if (svgContainer) svgContainer.innerHTML = buildTreeSVG(svgId, mode, stateKey, w, h);

    // Update status message
    const statusEl = panel.querySelector('.viz-status');
    if (statusEl) statusEl.innerHTML = renderStepMsg(stateKey, mode);

    // Update data structure display
    const dsEl = panel.querySelector('.viz-ds');
    if (dsEl) dsEl.innerHTML = renderDSDisplay(stateKey, mode);

    // Update button disabled states
    const s = animState[stateKey];
    const maxStep = (mode === 'dfs' ? DFS_ORDER : BFS_ORDER).length - 1;
    const fwdBtn = panel.querySelector('.viz-step-fwd');
    if (fwdBtn) fwdBtn.disabled = s.step >= maxStep;
    const backBtn = panel.querySelector('.viz-step-back');
    if (backBtn) backBtn.disabled = s.step <= -1;
  });
}

// ═══════════════════════════
// Control Helpers
// ═══════════════════════════
function stepAnim(stateKey, mode, dir) {
  const s = animState[stateKey];
  const maxStep = (mode === 'dfs' ? DFS_ORDER : BFS_ORDER).length - 1;
  s.step = Math.max(-1, Math.min(maxStep, s.step + dir));
  updateVizOnly(stateKey, mode);
}

function playAnim(stateKey, mode) {
  const s = animState[stateKey];
  if (s.playing) return;
  s.playing = true;
  const maxStep = (mode === 'dfs' ? DFS_ORDER : BFS_ORDER).length - 1;
  function tick() {
    if (s.step >= maxStep) {
      s.playing = false;
      updateVizOnly(stateKey, mode);
      return;
    }
    s.step++;
    updateVizOnly(stateKey, mode);
    s.timer = setTimeout(tick, animSpeed);
  }
  tick();
}

function resetAnim(stateKey) {
  const s = animState[stateKey];
  if (s.timer) clearTimeout(s.timer);
  const mode = s.step >= 0 ? 'dfs' : 'dfs'; // need to figure out mode
  s.step = -1;
  s.playing = false;
  // Find the panel to get the mode
  const panel = document.querySelector(`.viz-panel[data-viz="${stateKey}"]`);
  const actualMode = panel ? panel.getAttribute('data-mode') : 'dfs';
  updateVizOnly(stateKey, actualMode);
}

function stopAll() {
  Object.values(animState).forEach(s => {
    if (s.timer) clearTimeout(s.timer);
    s.playing = false;
  });
}

function setSpeed(val) {
  animSpeed = 1400 - val; // invert: higher slider = faster
}

// ═══════════════════════════
// DS Display Helpers
// ═══════════════════════════
function renderDSDisplay(stateKey, mode) {
  const s = animState[stateKey];
  const order = mode === 'dfs' ? DFS_ORDER : BFS_ORDER;
  const stacks = mode === 'dfs' ? DFS_STACKS : BFS_QUEUES;
  const label = mode === 'dfs' ? 'Stack (LIFO)' : 'Queue (FIFO)';
  const labelClass = mode === 'dfs' ? 'dfs-label' : 'bfs-label';

  if (s.step < 0) {
    return `<div class="ds-display"><div class="ds-label ${labelClass}">${label}</div><div class="ds-content" style="color: var(--text-dim);">Click play or step to begin</div></div>`;
  }

  const idx = Math.min(s.step, stacks.length - 1);
  const snapshot = stacks[idx];
  const visited = order.slice(0, idx + 1);
  const dsName = mode === 'dfs' ? 'Stack' : 'Queue';

  return `
    <div class="ds-display">
      <div class="ds-label ${labelClass}">${label}</div>
      <div class="ds-content">
        ${snapshot.length === 0
          ? `<span style="color: var(--text-dim);">[empty]</span>`
          : `[${snapshot.map((n, i) => `<span${i === 0 && mode === 'dfs' ? ' class="current-item"' : (i === 0 && mode === 'bfs' ? ' class="current-item"' : '')}>${n}</span>`).join(', ')}]`
        }
      </div>
    </div>
    <div class="ds-display" style="margin-top: 8px;">
      <div class="ds-label" style="color: var(--green);">Visited</div>
      <div class="ds-content">
        [${visited.map(n => `<span class="visited-item">${n}</span>`).join(' → ')}]
      </div>
    </div>
  `;
}

function renderStepMsg(stateKey, mode) {
  const s = animState[stateKey];
  const steps = mode === 'dfs' ? DFS_STEPS : BFS_STEPS;
  const cls = mode === 'dfs' ? 'dfs-msg' : 'bfs-msg';
  if (s.step < 0) return '';
  const idx = Math.min(s.step, steps.length - 1);
  return `<div class="status-msg ${cls}"><strong>Step ${idx + 1}:</strong> ${steps[idx]}</div>`;
}

function renderCode() {
  return `
    <h2>Kotlin Implementation</h2>

    <h3>Tree Node Definition</h3>
    <div class="code-block">
      <span class="lang-tag">Kotlin</span>
<span class="kw">data class</span> <span class="tp">TreeNode</span>(
    <span class="kw">val</span> <span class="tp">value</span>: <span class="tp">Int</span>,
    <span class="kw">val</span> <span class="tp">left</span>: <span class="tp">TreeNode</span>? = <span class="kw">null</span>,
    <span class="kw">val</span> <span class="tp">right</span>: <span class="tp">TreeNode</span>? = <span class="kw">null</span>
)
    </div>

    <h3>DFS — Recursive (uses the call stack)</h3>
    <div class="code-block">
      <span class="lang-tag">Kotlin — DFS Recursive</span>
<span class="kw">fun</span> <span class="fn">dfs</span>(<span class="tp">node</span>: <span class="tp">TreeNode</span>?) {
    <span class="kw">if</span> (node == <span class="kw">null</span>) <span class="kw">return</span>       <span class="cm">// base case</span>

    <span class="fn">println</span>(node.value)          <span class="cm">// visit current node</span>
    <span class="fn">dfs</span>(node.left)               <span class="cm">// recurse left subtree</span>
    <span class="fn">dfs</span>(node.right)              <span class="cm">// recurse right subtree</span>
}
    </div>

    <h3>DFS — Iterative (explicit stack)</h3>
    <div class="code-block">
      <span class="lang-tag">Kotlin — DFS Iterative</span>
<span class="kw">fun</span> <span class="fn">dfsIterative</span>(<span class="tp">root</span>: <span class="tp">TreeNode</span>) {
    <span class="kw">val</span> stack = <span class="fn">ArrayDeque</span>&lt;<span class="tp">TreeNode</span>&gt;()
    stack.<span class="fn">addLast</span>(root)

    <span class="kw">while</span> (stack.<span class="fn">isNotEmpty</span>()) {
        <span class="kw">val</span> node = stack.<span class="fn">removeLast</span>()  <span class="cm">// pop</span>
        <span class="fn">println</span>(node.value)

        <span class="cm">// Push right first so left is processed first (LIFO)</span>
        node.right?.<span class="kw">let</span> { stack.<span class="fn">addLast</span>(it) }
        node.left?.<span class="kw">let</span> { stack.<span class="fn">addLast</span>(it) }
    }
}
    </div>

    <h3>BFS — Iterative (queue)</h3>
    <div class="code-block">
      <span class="lang-tag">Kotlin — BFS</span>
<span class="kw">fun</span> <span class="fn">bfs</span>(<span class="tp">root</span>: <span class="tp">TreeNode</span>) {
    <span class="kw">val</span> queue = <span class="fn">ArrayDeque</span>&lt;<span class="tp">TreeNode</span>&gt;()
    queue.<span class="fn">addLast</span>(root)

    <span class="kw">while</span> (queue.<span class="fn">isNotEmpty</span>()) {
        <span class="kw">val</span> node = queue.<span class="fn">removeFirst</span>()  <span class="cm">// dequeue</span>
        <span class="fn">println</span>(node.value)

        <span class="cm">// Enqueue children — left first, then right</span>
        node.left?.<span class="kw">let</span> { queue.<span class="fn">addLast</span>(it) }
        node.right?.<span class="kw">let</span> { queue.<span class="fn">addLast</span>(it) }
    }
}
    </div>

    <div class="mental-model">
      <div class="title">The One-Line Difference</div>
      <p>Look at the iterative DFS and BFS code. They're almost identical. The only difference:</p>
      <p><span class="accent">DFS</span>: <code>stack.removeLast()</code> — takes from the <strong>top</strong> (LIFO)</p>
      <p><span class="cyan">BFS</span>: <code>queue.removeFirst()</code> — takes from the <strong>front</strong> (FIFO)</p>
      <p>That single line change completely transforms the traversal order. The data structure is the algorithm.</p>
    </div>

    ${renderQuiz2('code_q1',
      'If you accidentally used removeFirst() in the DFS code (making it a queue), what traversal order would you get?',

        'Still DFS — order doesn\'t matter',
        'BFS — you\'d get level-order traversal',
        'Random order',
        'Reverse DFS'
      ],
      1,
      "Exactly! Swapping removeLast() (stack) for removeFirst() (queue) converts DFS into BFS. The loop structure is identical — only the pop/dequeue direction differs. This is why understanding stacks vs queues is so fundamental."
    )}

    <button class="next-btn" onclick="nextSection()">Next: Final Quiz →</button>
  `;
}

    ` : ''}

    <button class="next-btn" onclick="nextSection()">Next: Problems →</button>
  `;
}

function renderQuiz2(id, question, options, correctIdx, explanation) {
  const answered = quizAnswers[id] !== undefined;
  const selectedIdx = quizAnswers[id + '_sel'];

  return `
    <div class="quiz-card">
      <h4>Quiz</h4>
      <div class="question" style="white-space: pre-wrap;">${question}</div>
      <div class="quiz-options">
        ${options.map((opt, i) => {
          let cls = '';
          if (answered) {
            if (i === correctIdx) cls = 'correct';
            else if (i === selectedIdx && i !== correctIdx) cls = 'wrong';
          }
          return `<button class="quiz-option ${cls}" ${answered ? 'disabled' : ''} onclick="answerQuiz2('${id}', ${i}, ${correctIdx})">${opt}</button>`;
        }).join('')}
      </div>
      ${answered ? `<div class="quiz-explanation ${quizAnswers[id] ? 'correct' : 'wrong'}">${quizAnswers[id] ? '✓ Correct!' : '✗ Not quite.'} ${explanation}</div>` : ''}
    </div>
  `;
}

function answerQuiz2(id, selected, correct) {
  quizAnswers[id] = selected === correct;
  quizAnswers[id + '_sel'] = selected;
  render();
}

// ── Construct Binary Tree from Preorder & Inorder ──
// Step-through state
let constructStep = -1;
let constructPlaying = false;
let constructTimer = null;

function getConstructSteps() {
  // preorder = [1,2,3,4], inorder = [2,1,3,4]
  // We'll trace through the algorithm step by step
  return [
    {
      desc: '<strong>Start:</strong> Call <code>dfs(limit = MAX)</code>. preOrderIndex = 0, inOrderIndex = 0.<br>preorder[0] = <span class="accent">1</span> — this is our root.',
      tree: { 1: { left: null, right: null, active: true } },
      preIdx: 1, inIdx: 0,
      highlight: 'Create root node <b>1</b>. Now recurse left: <code>dfs(limit = 1)</code>',
      preHL: [0], inHL: [],
    },
    {
      desc: '<strong>Recurse left of 1:</strong> <code>dfs(limit = 1)</code>. preorder[1] = 2. Check: inorder[0] = 2, is 2 == limit(1)? No. So create node <span class="accent">2</span>.',
      tree: { 1: { left: 2, right: null }, 2: { left: null, right: null, active: true } },
      preIdx: 2, inIdx: 0,
      highlight: 'Create node <b>2</b> as left child of <b>1</b>. Now recurse left: <code>dfs(limit = 2)</code>',
      preHL: [1], inHL: [],
    },
    {
      desc: '<strong>Recurse left of 2:</strong> <code>dfs(limit = 2)</code>. Check: inorder[0] = <span class="cyan">2</span> == limit(2)? <span class="accent">Yes!</span> This means node 2 has no left child. Increment inOrderIndex to 1.',
      tree: { 1: { left: 2, right: null }, 2: { left: 'nil', right: null, active: true } },
      preIdx: 2, inIdx: 1,
      highlight: 'Hit the limit! Node <b>2</b> has no left child. inOrderIndex moves past <b>2</b>. Return null, now recurse right of <b>2</b>: <code>dfs(limit = 1)</code>',
      preHL: [], inHL: [0],
    },
    {
      desc: '<strong>Recurse right of 2:</strong> <code>dfs(limit = 1)</code>. Check: inorder[1] = <span class="cyan">1</span> == limit(1)? <span class="accent">Yes!</span> Node 2 has no right child either. Increment inOrderIndex to 2.',
      tree: { 1: { left: 2, right: null }, 2: { left: 'nil', right: 'nil', done: true } },
      preIdx: 2, inIdx: 2,
      highlight: 'Hit the limit again! Node <b>2</b> is a leaf. inOrderIndex moves past <b>1</b>. Return null, now recurse right of <b>1</b>: <code>dfs(limit = MAX)</code>',
      preHL: [], inHL: [1],
    },
    {
      desc: '<strong>Recurse right of 1:</strong> <code>dfs(limit = MAX)</code>. preorder[2] = 3. Check: inorder[2] = 3, is 3 == MAX? No. Create node <span class="accent">3</span>.',
      tree: { 1: { left: 2, right: 3 }, 2: { left: 'nil', right: 'nil', done: true }, 3: { left: null, right: null, active: true } },
      preIdx: 3, inIdx: 2,
      highlight: 'Create node <b>3</b> as right child of <b>1</b>. Now recurse left: <code>dfs(limit = 3)</code>',
      preHL: [2], inHL: [],
    },
    {
      desc: '<strong>Recurse left of 3:</strong> <code>dfs(limit = 3)</code>. Check: inorder[2] = <span class="cyan">3</span> == limit(3)? <span class="accent">Yes!</span> Node 3 has no left child. Increment inOrderIndex to 3.',
      tree: { 1: { left: 2, right: 3 }, 2: { left: 'nil', right: 'nil', done: true }, 3: { left: 'nil', right: null, active: true } },
      preIdx: 3, inIdx: 3,
      highlight: 'Hit the limit! Node <b>3</b> has no left child. inOrderIndex moves past <b>3</b>. Return null, now recurse right of <b>3</b>: <code>dfs(limit = MAX)</code>',
      preHL: [], inHL: [2],
    },
    {
      desc: '<strong>Recurse right of 3:</strong> <code>dfs(limit = MAX)</code>. preorder[3] = 4. Check: inorder[3] = 4, is 4 == MAX? No. Create node <span class="accent">4</span>.',
      tree: { 1: { left: 2, right: 3 }, 2: { left: 'nil', right: 'nil', done: true }, 3: { left: 'nil', right: 4 }, 4: { left: null, right: null, active: true } },
      preIdx: 4, inIdx: 3,
      highlight: 'Create node <b>4</b> as right child of <b>3</b>. preOrderIndex = 4 which is >= array size, so further recursions return null.',
      preHL: [3], inHL: [],
    },
    {
      desc: '<strong>Done!</strong> preOrderIndex has reached the end. All recursions return. The tree is fully constructed.',
      tree: { 1: { left: 2, right: 3, root: true }, 2: { left: 'nil', right: 'nil', done: true }, 3: { left: 'nil', right: 4, done: true }, 4: { left: 'nil', right: 'nil', done: true } },
      preIdx: 4, inIdx: 4,
      highlight: 'Tree construction complete! Output: [1, 2, 3, null, null, null, 4]',
      preHL: [], inHL: [],
    },
  ];
}

function buildConstructTreeSVG(step) {
  const w = 460, h = 300;
  const steps = getConstructSteps();
  const s = step >= 0 ? steps[Math.min(step, steps.length - 1)] : null;

  const nodes = {};
  if (s) {
    Object.keys(s.tree).forEach(k => { nodes[parseInt(k)] = s.tree[parseInt(k)]; });
  }

  // Positions for potential nodes
  const positions = {
    1: { x: w/2, y: 50 },
    2: { x: w/2 - 120, y: 150 },
    3: { x: w/2 + 120, y: 150 },
    4: { x: w/2 + 200, y: 250 },
  };

  // edges
  const edges = [];
  if (s) {
    if (s.tree[1]?.left === 2) edges.push({from: 1, to: 2});
    if (s.tree[1]?.right === 3) edges.push({from: 1, to: 3});
    if (s.tree[3]?.right === 4) edges.push({from: 3, to: 4});
  }

  let svg = `<svg class="tree-svg" viewBox="0 0 ${w} ${h}" style="height: 300px;">`;

  // Draw edges
  edges.forEach(e => {
    const p1 = positions[e.from];
    const p2 = positions[e.to];
    svg += `<line class="tree-edge lit-dfs" x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}"/>`;
  });

  // Draw nodes
  Object.keys(nodes).forEach(k => {
    const id = parseInt(k);
    const p = positions[id];
    if (!p) return;
    const n = nodes[id];
    const isActive = n.active;
    const isDone = n.done;
    const isRoot = n.root;
    let cls = 'led-node lit-dfs';
    if (isActive) cls += ' current';

    svg += `<g class="${cls}" transform="translate(${p.x},${p.y})">`;
    svg += `<circle class="led-base" r="24"/>`;
    svg += `<circle class="led-shine" r="18" cy="-4"/>`;
    svg += `<text class="led-label" dy="1">${id}</text>`;
    svg += `</g>`;
  });

  if (!s) {
    svg += `<text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#94a3b8" font-size="14">Click Step or Play to begin</text>`;
  }

  svg += `</svg>`;
  return svg;
}

function renderConstructArrays(step) {
  const preorder = [1, 2, 3, 4];
  const inorder = [2, 1, 3, 4];
  const steps = getConstructSteps();
  const s = step >= 0 ? steps[Math.min(step, steps.length - 1)] : null;

  function renderArr(arr, label, hlIndices, ptrIdx, ptrLabel) {
    let html = `<div style="margin: 8px 0;"><span style="color: var(--text-dim); font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">${label}</span><div style="display: flex; gap: 4px; margin-top: 4px;">`;
    arr.forEach((v, i) => {
      let bg = 'var(--surface)';
      let border = 'var(--border)';
      let color = 'var(--text)';
      if (s && hlIndices.includes(i)) { bg = 'rgba(233, 69, 96, 0.25)'; border = 'var(--accent)'; color = 'var(--accent)'; }
      if (s && i < ptrIdx) { color = 'var(--text-dim)'; }
      html += `<div style="width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: ${bg}; border: 2px solid ${border}; border-radius: 8px; font-family: monospace; font-size: 1.1em; font-weight: 700; color: ${color}; position: relative;">`;
      html += `${v}`;
      if (s && i === ptrIdx) {
        html += `<span style="position: absolute; top: -18px; font-size: 0.6em; color: var(--cyan); font-weight: 700;">${ptrLabel}</span>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
    return html;
  }

  const preIdx = s ? s.preIdx : 0;
  const inIdx = s ? s.inIdx : 0;
  const preHL = s ? s.preHL : [];
  const inHL = s ? s.inHL : [];

  return `
    ${renderArr(preorder, 'Preorder', preHL, Math.min(preIdx, preorder.length), 'preIdx')}
    ${renderArr(inorder, 'Inorder', inHL, Math.min(inIdx, inorder.length), 'inIdx')}
  `;
}

function stepConstruct(dir) {
  const maxStep = getConstructSteps().length - 1;
  constructStep = Math.max(-1, Math.min(maxStep, constructStep + dir));
  updateConstructViz();
}

function playConstruct() {
  if (constructPlaying) return;
  constructPlaying = true;
  const maxStep = getConstructSteps().length - 1;
  function tick() {
    if (constructStep >= maxStep) { constructPlaying = false; updateConstructViz(); return; }
    constructStep++;
    updateConstructViz();
    constructTimer = setTimeout(tick, 1200);
  }
  tick();
}

function resetConstruct() {
  if (constructTimer) clearTimeout(constructTimer);
  constructPlaying = false;
  constructStep = -1;
  updateConstructViz();
}

function updateConstructViz() {
  const panel = document.querySelector('.construct-viz-panel');
  if (!panel) { render(); return; }

  const svgContainer = panel.querySelector('.construct-svg');
  if (svgContainer) svgContainer.innerHTML = buildConstructTreeSVG(constructStep);

  const arrContainer = panel.querySelector('.construct-arrays');
  if (arrContainer) arrContainer.innerHTML = renderConstructArrays(constructStep);

  const msgContainer = panel.querySelector('.construct-msg');
  if (msgContainer) {
    const steps = getConstructSteps();
    if (constructStep >= 0) {
      const s = steps[Math.min(constructStep, steps.length - 1)];
      msgContainer.innerHTML = `<div class="status-msg dfs-msg">${s.desc}</div><div style="margin-top: 8px; padding: 10px 14px; background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 8px; color: #6ee7b7; font-size: 0.88em;">${s.highlight}</div>`;
    } else {
      msgContainer.innerHTML = '';
    }
  }

  // Update buttons
  const maxStep = getConstructSteps().length - 1;
  const fwd = panel.querySelector('.c-step-fwd');
  if (fwd) fwd.disabled = constructStep >= maxStep;
  const back = panel.querySelector('.c-step-back');
  if (back) back.disabled = constructStep <= -1;
}

function renderProblems() {
  return `
    <h2>Problems</h2>
    <p>Apply what you\'ve learned about tree traversals to solve real problems.</p>

    <div style="background: var(--surface); border: 2px solid var(--accent2); border-radius: 12px; padding: 24px; margin: 20px 0;">
      <h3 style="color: var(--accent); margin-bottom: 4px;">Problem 1: Construct Binary Tree from Preorder & Inorder</h3>
      <p style="color: var(--text-dim); font-size: 0.9em; margin-bottom: 16px;">Difficulty: Medium</p>

      <p>You are given two integer arrays <code>preorder</code> and <code>inorder</code>:</p>
      <p style="margin: 8px 0;">• <code>preorder</code> is the preorder traversal of a binary tree</p>
      <p style="margin: 8px 0;">• <code>inorder</code> is the inorder traversal of the same tree</p>
      <p style="margin: 8px 0;">• Both arrays have the same size and consist of unique values</p>
      <p style="margin-top: 12px;"><strong>Rebuild the binary tree</strong> from these two traversals and return its root.</p>
    </div>

    <h3>Examples</h3>
    <div class="step-trace">Example 1:
Input:  preorder = [1, 2, 3, 4], inorder = [2, 1, 3, 4]
Output: [1, 2, 3, null, null, null, 4]

        1
       / \\
      2   3
           \\
            4</div>

    <div class="step-trace">Example 2:
Input:  preorder = [1], inorder = [1]
Output: [1]

    1</div>

    <h3>Key Insight</h3>
    <div class="mental-model">
      <div class="title">Why Preorder + Inorder Is Enough</div>
      <p><strong>Preorder</strong> tells you the <span class="accent">root</span> of each subtree — the first element is always the root.</p>
      <p><strong>Inorder</strong> tells you the <span class="cyan">boundary</span> — everything before the root is in the left subtree, everything after is in the right subtree.</p>
      <p style="margin-top: 8px;">The clever trick in this solution: instead of finding the root in the inorder array each time (O(n)), we use a <code>limit</code> parameter. When <code>inorder[inOrderIndex] == limit</code>, we know we\'ve reached the boundary of the current subtree.</p>
    </div>

    <h3>Algorithm Walkthrough</h3>
    <p>Step through the algorithm on <code>preorder = [1,2,3,4]</code>, <code>inorder = [2,1,3,4]</code>:</p>

    <div class="construct-viz-panel" style="margin: 20px 0;">
      <div class="construct-svg">${buildConstructTreeSVG(constructStep)}</div>
      <div class="construct-arrays">${renderConstructArrays(constructStep)}</div>
      <div class="controls">
        <button class="dfs" onclick="playConstruct()" ${constructPlaying ? 'disabled' : ''}>▶ Play</button>
        <button class="neutral c-step-fwd" onclick="stepConstruct(1)" ${constructStep >= getConstructSteps().length - 1 ? 'disabled' : ''}>Step →</button>
        <button class="neutral c-step-back" onclick="stepConstruct(-1)" ${constructStep <= -1 ? 'disabled' : ''}>← Back</button>
        <button class="neutral" onclick="resetConstruct()">Reset</button>
      </div>
      <div class="construct-msg">${constructStep >= 0 ? (() => { const s = getConstructSteps()[Math.min(constructStep, getConstructSteps().length - 1)]; return '<div class="status-msg dfs-msg">' + s.desc + '</div><div style="margin-top: 8px; padding: 10px 14px; background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 8px; color: #6ee7b7; font-size: 0.88em;">' + s.highlight + '</div>'; })() : ''}</div>
    </div>

    <h3>How <code>dfs(limit)</code> Works</h3>
    <div class="analogy">
      <div class="title">The Limit Trick</div>
      <p>The <code>limit</code> parameter acts as a fence. When building the left subtree of a node, we set <code>limit = node.val</code>. This way, when we encounter the node\'s value in the inorder array, we know the left subtree is done.</p>
      <p style="margin-top: 8px;">For the right subtree, we pass the parent\'s limit down — the fence moves up to the grandparent level.</p>
      <p style="margin-top: 8px;">The initial call uses <code>Int.MAX_VALUE</code> as the limit — there\'s no upper fence for the root\'s subtree.</p>
    </div>

    <h3>Solution — Kotlin</h3>
    <div class="code-block">
      <span class="lang-tag">Kotlin</span>
<span class="kw">class</span> <span class="tp">ConstructTree</span> {
    <span class="kw">private var</span> preOrderIndex = <span class="nm">0</span>
    <span class="kw">private var</span> inOrderIndex = <span class="nm">0</span>

    <span class="kw">fun</span> <span class="fn">buildTree</span>(preorder: <span class="tp">IntArray</span>, inorder: <span class="tp">IntArray</span>): <span class="tp">TreeNode</span>? {

        <span class="kw">fun</span> <span class="fn">dfs</span>(limit: <span class="tp">Int</span>): <span class="tp">TreeNode</span>? {
            <span class="cm">// Base case 1: consumed all preorder elements</span>
            <span class="kw">if</span> (preOrderIndex >= preorder.size) {
                <span class="kw">return null</span>
            }

            <span class="cm">// Base case 2: hit the boundary in inorder</span>
            <span class="kw">if</span> (inorder[inOrderIndex] == limit) {
                inOrderIndex++
                <span class="kw">return null</span>
            }

            <span class="cm">// Create node from next preorder element</span>
            <span class="kw">val</span> root = <span class="fn">TreeNode</span>(preorder[preOrderIndex])
            preOrderIndex++

            <span class="cm">// Build left subtree (bounded by current node\'s value)</span>
            root.left = <span class="fn">dfs</span>(root.\`val\`)

            <span class="cm">// Build right subtree (bounded by parent\'s limit)</span>
            root.right = <span class="fn">dfs</span>(limit)

            <span class="kw">return</span> root
        }

        <span class="kw">return</span> <span class="fn">dfs</span>(<span class="tp">Int</span>.MAX_VALUE)
    }
}
    </div>

    <h3>Complexity</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0;">
      <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center;">
        <div style="font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px;">Time</div>
        <div style="font-size: 1.3em; font-weight: 700; color: var(--green);">O(n)</div>
        <div style="font-size: 0.82em; color: var(--text-dim); margin-top: 4px;">Each node visited exactly once</div>
      </div>
      <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center;">
        <div style="font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px;">Space</div>
        <div style="font-size: 1.3em; font-weight: 700; color: var(--cyan);">O(n)</div>
        <div style="font-size: 0.82em; color: var(--text-dim); margin-top: 4px;">Recursion stack + output tree</div>
      </div>
    </div>

    ${renderQuiz2('prob_q1',
      'Why does the algorithm pass root.val as the limit when building the left subtree?',
      [
        'Because the left subtree values are always less than the root',
        'Because in inorder traversal, the root appears right after its left subtree — so hitting root.val means the left subtree is complete',
        'To avoid stack overflow',
        'It\'s just a random sentinel value'
      ],
      1,
      "In an inorder traversal, the sequence is: [left subtree] → root → [right subtree]. So when we\'re building the left subtree and encounter root.val in the inorder array, it means we\'ve exhausted all left-subtree nodes. The limit acts as a boundary marker, not a value comparison."
    )}

    ${renderQuiz2('prob_q2',
      'What would happen if we swapped the order of root.left = dfs(root.val) and root.right = dfs(limit)?',
      [
        'Nothing — order doesn\'t matter',
        'The tree would be mirrored (left and right swapped)',
        'It would crash',
        'It would build the correct tree but slower'
      ],
      1,
      "The order matters! The preorder array is consumed left-to-right. Calling dfs for the right subtree first would assign left-subtree nodes to the right side and vice versa, producing a mirrored tree. The algorithm relies on processing left before right to match the preorder sequence."
    )}
  `;
}

// ── Fix code block indentation ──
function fixCodeBlocks() {
  document.querySelectorAll('.code-block, .step-trace').forEach(block => {
    const html = block.innerHTML;
    const lines = html.split('\n');
    while (lines.length && lines[0].trim() === '') lines.shift();
    while (lines.length && lines[lines.length - 1].trim() === '') lines.pop();
    const contentLines = lines.filter(l => l.trim() !== '' && !l.trim().match(/^<span class="lang-tag">.*<\/span>$/));
    const indents = contentLines.map(l => {
      const match = l.match(/^( *)/);
      return match ? match[1].length : 0;
    });
    const minIndent = Math.min(...indents);
    if (minIndent > 0) {
      const fixed = lines.map(l => {
        let stripped = 0;
        let i = 0;
        while (i < l.length && l[i] === ' ' && stripped < minIndent) { i++; stripped++; }
        return l.slice(i);
      });
      block.innerHTML = fixed.join('\n');
    } else {
      block.innerHTML = lines.join('\n');
    }
  });
}

// ── Init ──
render();
